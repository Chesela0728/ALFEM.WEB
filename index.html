// 星空
const c=document.getElementById("stars");const x=c.getContext("2d");
function rs(){c.width=innerWidth;c.height=innerHeight}rs();onresize=rs;
let s=[];for(let i=0;i<120;i++)s.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*1.5,v:Math.random()*0.5+0.2});
function a(){x.clearRect(0,0,c.width,c.height);x.fillStyle="#fff";for(let p of s){x.beginPath();x.arc(p.x,p.y,p.r,0,6.28);x.fill();p.y+=p.v;if(p.y>c.height){p.y=0;p.x=Math.random()*c.width}}requestAnimationFrame(a)}a();

// ✨ 粒子（标题呼吸增强）
const pc=document.getElementById("particles");const px=pc.getContext("2d");pc.width=innerWidth;pc.height=innerHeight;
let ps=[];for(let i=0;i<80;i++)ps.push({x:innerWidth/2+(Math.random()*200-100),y:100+Math.random()*80,r:Math.random()*2,v:Math.random()*1-0.5});
function pa(){px.clearRect(0,0,pc.width,pc.height);px.fillStyle="rgba(180,160,255,0.8)";for(let p of ps){px.beginPath();px.arc(p.x,p.y,p.r,0,6.28);px.fill();p.x+=p.v;if(p.x<0)p.x=innerWidth;if(p.x>innerWidth)p.x=0;}requestAnimationFrame(pa)}pa();

// 轮播
let slides=document.querySelectorAll('.slide');let i=0;
setInterval(()=>{slides[i].classList.remove('active');i=Math.floor(Math.random()*slides.length);slides[i].classList.add('active');},3000);
