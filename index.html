<!DOCTYPE html><html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>艾尔梅德战记 Another</title>
<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#0b0f1a;
  color:#fff;
}header { text-align:center; padding:40px 20px; }

.title { font-size:42px; font-weight:bold; }

.subtitle { font-size:26px; background: linear-gradient(90deg, red, orange, yellow, green, cyan, blue, violet); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display:inline-block; margin-left:10px; }

.slideshow { width:100%; height:400px; position:relative; overflow:hidden; }

.slide { position:absolute; width:100%; height:100%; object-fit:cover; opacity:0; transition:opacity 1s; }

.slide.active { opacity:1; }

.section { text-align:center; padding:40px 20px; }

.button { background:#2563eb; padding:12px 24px; border-radius:8px; color:white; text-decoration:none; }

footer { text-align:center; padding:20px; font-size:14px; color:#aaa; } </style>

</head>
<body><header>
  <div class="title">
    艾尔梅德战记
    <span class="subtitle">Another</span>
  </div>
</header><div class="slideshow">
  <img class="slide active" src="images/1.jpg">
  <img class="slide" src="images/2.jpg">
  <img class="slide" src="images/3.jpg">
</div><div class="section">
  <h2>策略战棋 · 战争史诗</h2>
  <p>在战火与命运交织的世界中，做出你的选择。</p>
  <br>
  <a class="button" href="#">下载游戏</a>
</div><footer>
  <p>同人作品，仅供学习交流</p>
</footer><script>
let slides = document.querySelectorAll('.slide');
let index = 0;

setInterval(() => {
  slides[index].classList.remove('active');
  index = Math.floor(Math.random() * slides.length);
  slides[index].classList.add('active');
}, 3000);
</script></body>
</html>
